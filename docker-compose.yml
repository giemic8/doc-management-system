version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: dms_postgres
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-dms_db}
      POSTGRES_USER: ${POSTGRES_USER:-dms_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dms_secret_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dms_user} -d ${POSTGRES_DB:-dms_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: dms_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dms_backend
    restart: always
    ports:
      - "4000:4000"
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgres://${POSTGRES_USER:-dms_user}:${POSTGRES_PASSWORD:-dms_secret_password}@postgres:5432/${POSTGRES_DB:-dms_db}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:-super_secret_jwt_key_change_in_prod}
      MFA_ENCRYPTION_KEY: ${MFA_ENCRYPTION_KEY:-change_this_mfa_encryption_key_in_prod}
      STORAGE_ENCRYPTION_KEY: ${STORAGE_ENCRYPTION_KEY:-change_this_storage_encryption_key_in_prod}
      STORAGE_ENCRYPTION_ENABLED: ${STORAGE_ENCRYPTION_ENABLED:-false}
      STORAGE_PATH: /app/storage
    volumes:
      - ./storage:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    # No container_name: fixed names collide when scaling to N replicas via
    # `docker compose up -d --scale worker=4`.
    restart: always
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      DATABASE_URL: postgres://${POSTGRES_USER:-dms_user}:${POSTGRES_PASSWORD:-dms_secret_password}@postgres:5432/${POSTGRES_DB:-dms_db}
      STORAGE_PATH: /app/storage
      OLLAMA_HOST: ${OLLAMA_HOST:-http://ollama:11434}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      LLM_PROVIDER: ${LLM_PROVIDER:-ollama}
      MFA_ENCRYPTION_KEY: ${MFA_ENCRYPTION_KEY:-change_this_mfa_encryption_key_in_prod}
      METRICS_PORT: 9100
    volumes:
      - ./storage:/app/storage
    # Uncomment to enable NVIDIA GPU acceleration for Tesseract/Ollama
    # (requires the NVIDIA Container Toolkit installed on the host):
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: dms_frontend
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - backend

  ollama:
    image: ollama/ollama:latest
    container_name: dms_ollama
    restart: always
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

volumes:
  postgres_data:
  redis_data:
  ollama_data:
